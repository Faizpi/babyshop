name: warungku
description: "Aplikasi Flutter offline-first untuk mengelola stok multi-warung kebutuhan bayi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Local Database
  sqflite: ^2.4.1
  sqflite_common_ffi_web: ^0.4.5+2
  path: ^1.9.0
  path_provider: ^2.1.5
  
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # UI Components
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.1.4
  
  # Local Notifications
  flutter_local_notifications: ^18.0.1
  
  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoamara.png"
  adaptive_icon_background: "#FFE4EC"
  adaptive_icon_foreground: "assets/images/logoamara.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
